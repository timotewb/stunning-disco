version: "3.8"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ${DATA_PATH}:/app/data
    environment:
      - DATABASE_URL=file:/app/data/practice.db
      - NODE_ENV=production
      # Default targets the docker service.
      # Override to http://host.docker.internal:11434 for native Ollama on Mac.
      - OLLAMA_URL=http://ollama:11434
